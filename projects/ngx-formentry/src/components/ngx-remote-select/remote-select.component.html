<ng-select
  [ngClass]="{
    'afe-custom': theme === 'light',
    'invalid': invalid ?? false
  }"
  [disabled]="disabled"
  [items]="remoteOptions$ | async"
  bindLabel="label"
  bindValue="value"
  [multiple]="false"
  [hideSelected]="true"
  [compareWith]="compareItems"
  [trackByFn]="trackByFn"
  [loading]="loading"
  [typeToSearchText]="'enterMoreCharacters' | translate"
  [typeahead]="remoteOptionInput$"
  [searchFn]="keepServerResults"
  [ngModel]="selectedRemoteOptions"
  (ngModelChange)="selectedRemoteOptions = $event; selected($event)"
  [appendTo]="'form'"
>
  <ng-template ng-label-tmp let-item="item">
    <span class="ofe-remote-select-item">
      <span class="ofe-remote-select-item-code" *ngIf="item?.code">{{
        item.code
      }}</span>
      <span class="ofe-remote-select-item-label">{{ item?.label }}</span>
    </span>
  </ng-template>
  <ng-template ng-option-tmp let-item="item">
    <span class="ofe-remote-select-item">
      <span class="ofe-remote-select-item-code" *ngIf="item?.code">{{
        item.code
      }}</span>
      <span class="ofe-remote-select-item-label">{{ item?.label }}</span>
    </span>
  </ng-template>
</ng-select>
<div
  *ngIf="loadFailed || resolveFailed"
  class="ofe-remote-select-error"
  role="alert"
>
  {{ 'errorLoadingResults' | translate }}
</div>
